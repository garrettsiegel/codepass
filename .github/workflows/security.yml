name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly, Mondays 08:00 UTC — catches advisories published after merge.
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit + licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Audit production dependencies (fail on high+)
        run: pnpm audit --prod --audit-level high

      - name: List dependency licenses
        run: pnpm licenses list --prod || true
